name: AMLyricsBTW
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: ja
targets:
  AMLyricsBTW:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Models
        includes: ["*.swift"]
      - path: Views
        includes: ["*.swift"]
      - path: Managers
        includes: ["*.swift"]
      - path: SwiftData
        includes: ["*.swift"]
      - path: Utilities
        includes: ["*.swift"]
      - path: AMLyricsBTW
        includes: ["*.swift"]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.amlyricsbtw
      SWIFT_VERSION: "6.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_FILE: Info.plist
    capabilities:
      - musicKit
